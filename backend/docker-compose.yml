version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: agri_guard_db
    environment:
      POSTGRES_USER: agriguard
      POSTGRES_PASSWORD: agriguard_secret
      POSTGRES_DB: agriguard
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agriguard -d agriguard"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: agri_guard_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pg_data:
